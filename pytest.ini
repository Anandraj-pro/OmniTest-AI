[pytest]
testpaths = tests
# Put the repo root on sys.path so `import omnitest` works under the bare
# `pytest` console script (CI), not just `python -m pytest`.
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --alluredir=artifacts/allure-results
# (pytest-playwright defaults the browser to chromium; no need to force --browser,
#  which would error in environments where that plugin isn't installed.)
# Base for pytest-bdd feature lookups. `scenarios("features")` in
# tests/bdd/test_features.py resolves against this → tests/bdd/features.
bdd_features_base_dir = tests/bdd
markers =
    api: API-layer tests
    ui: Playwright UI tests
    email: email send/receive tests
    smoke: fast critical-path checks
    ai: tests that exercise the AI agents
    story: attach a user-story ID, e.g. @pytest.mark.story("OMNI-142")