[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --alluredir=artifacts/allure-results
    --browser=chromium
bdd_features_base_dir = tests/bdd/features
markers =
    api: API-layer tests
    ui: Playwright UI tests
    email: email send/receive tests
    smoke: fast critical-path checks
    ai: tests that exercise the AI agents
    story: attach a user-story ID, e.g. @pytest.mark.story("OMNI-142")